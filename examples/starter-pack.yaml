- id: builtin-oauth-authorize
  case_id: demo-oauth-redirect
  title: OAuth authorization code leaked to attacker-controlled redirect_uri
  tags:
  - auth
  - oauth
  - stateful
  - second-order
  - demo
  source_name: Blackhole Built-in
  source_url: https://example.invalid/blackhole/builtin
  matcher:
    method: GET
    path: /oauth/authorize
    query:
      client_id: any
      redirect_uri: any
  response:
    status: 302
    headers:
      Location: '{{ query.redirect_uri }}?code=bhcode-demo&state=xyz'
    body_template: redirecting
  truth:
    vuln_class: auth.oauth.redirect-uri-misvalidation
    positive_evidence:
    - authorization code is issued to attacker-controlled or weakly validated redirect_uri
    guardrails:
    - mere presence of redirect_uri param is not enough without code leakage or unsafe
      redirect behavior
    manual_followup:
    - compare with /oauth/authorize-safe
    confidence_cap: high
    emulation_grade: stateful
    automation_grade: signature_plus_state
    north_star_section: auth
    delayed_effect: true
    second_order: true
    second_order_sink: oauth-authorization
    requires_repeat: true
  notes: *id001
