name: starter-pack
version: 0.6.0
profiles:
- id: builtin-reflected-xss
  case_id: demo-reflected-xss
  title: Reflected XSS in search
  tags:
  - xss
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-reflected-xss
  matcher:
    method: GET
    path: /search
    query:
      q: any
  response:
    status: 200
    headers:
      Content-Type: text/html; charset=utf-8
    body_template: "<html>\n  <body>\n    <h1>Search results</h1>\n    <div id=\"\
      results\">You searched for: {{ query.q }}</div>\n  </body>\n</html>\n"
  truth:
    vuln_class: xss.reflected
    positive_evidence:
    - unencoded reflection of user-controlled input in HTML body context
    guardrails:
    - HTML-encoded reflection alone is not enough to call XSS
    manual_followup:
    - verify script execution in a browser context
    confidence_cap: medium
    emulation_grade: replayable
    automation_grade: browser_assisted
    north_star_section: xss
- id: builtin-open-redirect
  case_id: demo-open-redirect
  title: Open redirect via next parameter
  tags:
  - redirect
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-open-redirect
  matcher:
    method: GET
    path: /redirect
    query:
      next: any
  response:
    status: 302
    headers:
      Location: '{{ query.next }}'
    body_template: redirecting
  truth:
    vuln_class: redirect.open
    positive_evidence:
    - attacker-controlled redirect target is accepted without validation
    guardrails:
    - relative internal redirect alone may be non-exploitable
    confidence_cap: medium
    emulation_grade: replayable
    automation_grade: signature
    north_star_section: redirect
- id: builtin-cors-permissive
  case_id: demo-cors-permissive
  title: Permissive CORS with credentials
  tags:
  - cors
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-cors-permissive
  matcher:
    method: GET
    path: /api/account
    headers:
      origin: any
  response:
    status: 200
    headers:
      Content-Type: application/json
      Access-Control-Allow-Origin: '{{ headers.Origin or headers.origin }}'
      Access-Control-Allow-Credentials: 'true'
    body_template: '{"email": "alice@example.org", "balance": 1337}

      '
  truth:
    vuln_class: cors.permissive
    positive_evidence:
    - arbitrary Origin is reflected while credentials are allowed
    guardrails:
    - wildcard ACAO without credentials is weaker evidence
    confidence_cap: medium
    emulation_grade: replayable
    automation_grade: signature
    north_star_section: cors
- id: builtin-sqli-error
  case_id: demo-sqli-error
  title: SQL error disclosure in product lookup
  tags:
  - sqli
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-sqli-error
  matcher:
    method: GET
    path: /product
    query:
      id: any
  response:
    status: 500
    headers:
      Content-Type: text/html; charset=utf-8
    body_template: '<html><body>SQLSTATE[42000]: syntax error near ''{{ query.id }}''</body></html>

      '
  truth:
    vuln_class: sqli
    positive_evidence:
    - SQL parser error with attacker-controlled token
    guardrails:
    - generic 500 alone is not enough
    confidence_cap: medium
    emulation_grade: replayable
    automation_grade: signature
    north_star_section: injection
- id: builtin-graphql-introspection
  case_id: demo-graphql-introspection
  title: GraphQL introspection enabled
  tags:
  - graphql
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-graphql-introspection
  matcher:
    method: POST
    path: /graphql
    body_contains: __schema
  response:
    status: 200
    headers:
      Content-Type: application/json
    body_template: '{"data":{"__schema":{"queryType":{"name":"Query"},"types":[{"name":"Query"},{"name":"User"},{"name":"Secret"}]}}}

      '
  truth:
    vuln_class: graphql.introspection-enabled
    positive_evidence:
    - __schema query succeeds
    confidence_cap: high
    emulation_grade: replayable
    automation_grade: signature
    north_star_section: graphql
- id: builtin-path-traversal
  case_id: demo-path-traversal
  title: Path traversal to sensitive file
  tags:
  - file-access
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-path-traversal
  matcher:
    method: GET
    path: /download
    query:
      file:
        regex: .*(\.\./|%2e%2e%2f).*
  response:
    status: 200
    headers:
      Content-Type: text/plain; charset=utf-8
    body_template: 'root:x:0:0:root:/root:/bin/bash

      daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin

      '
  truth:
    vuln_class: path-traversal
    positive_evidence:
    - traversal payload yields sensitive file content
    guardrails:
    - 200 with empty body is not enough
    confidence_cap: high
    emulation_grade: replayable
    automation_grade: signature
    north_star_section: file-access
- id: builtin-secret-leak
  case_id: demo-secret-leak
  title: Exposed config with secrets
  tags:
  - secrets
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-secret-leak
  matcher:
    method: GET
    path: /.env
  response:
    status: 200
    headers:
      Content-Type: text/plain; charset=utf-8
    body_template: 'APP_ENV=production

      DB_PASSWORD=supersecret-password

      AWS_SECRET_ACCESS_KEY=EXAMPLESECRET123

      '
  truth:
    vuln_class: secrets.file-exposure
    positive_evidence:
    - high-value secret material is retrievable without auth
    confidence_cap: high
    emulation_grade: replayable
    automation_grade: signature
    north_star_section: secrets
- id: builtin-store-comment
  case_id: demo-stored-xss-step1
  title: Store a comment that will later render
  tags:
  - xss
  - stateful
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-stored-xss
  matcher:
    method: POST
    path: /api/comments
    json_fields:
    - path: $.comment
      present: true
  response:
    status: 201
    headers:
      Content-Type: application/json
    body_template: '{"stored": true, "message": "comment accepted"}

      '
  scenario:
    name: stored-xss-flow
    required_state: STARTED
    next_state: COMMENT_STORED
  truth:
    vuln_class: xss.stored
    positive_evidence:
    - attacker-controlled comment is accepted for later rendering
    manual_followup:
    - fetch /comments and verify rendering context
    confidence_cap: medium
    emulation_grade: stateful
    automation_grade: browser_assisted
    north_star_section: xss
- id: builtin-render-comments
  case_id: demo-stored-xss-step2
  title: Render stored comments
  tags:
  - xss
  - stateful
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-stored-xss
  matcher:
    method: GET
    path: /comments
  response:
    status: 200
    headers:
      Content-Type: text/html; charset=utf-8
    body_template: '<html><body>

      <h1>Comments</h1>

      {% for comment in memory.comments or [] %}

      <div class="comment">{{ comment }}</div>

      {% endfor %}

      </body></html>

      '
  truth:
    vuln_class: xss.stored
    positive_evidence:
    - previously supplied comment is reflected from server-side storage
    guardrails:
    - no stored payload observed means no stored XSS proof yet
    manual_followup:
    - verify browser execution if the payload is script-capable
    confidence_cap: medium
    emulation_grade: stateful
    automation_grade: browser_assisted
    north_star_section: xss
- id: builtin-webhook-register
  case_id: demo-webhook-ssrf
  title: Register outbound webhook target (vulnerable)
  tags:
  - ssrf
  - webhook
  - stateful
  - second-order
  - demo
  source_name: Blackhole Built-in
  source_url: https://example.invalid/blackhole/builtin
  matcher:
    method: POST
    path: /api/webhooks/register
    json_fields:
    - path: $.target_url
      present: true
  response:
    status: 201
    headers:
      Content-Type: application/json
    body_template: '{"registered": true, "mode": "vulnerable"}'
  truth:
    vuln_class: ssrf.webhook-registration
    positive_evidence:
    - attacker-controlled webhook URL is stored for later server-side delivery
    guardrails:
    - URL storage alone is not enough without a later delivery sink
    manual_followup:
    - trigger the webhook to observe internal fetch behavior
    confidence_cap: medium
    emulation_grade: stateful
    automation_grade: signature_plus_state
    north_star_section: ssrf
    delayed_effect: true
    second_order: true
    second_order_sink: webhook-delivery
    requires_repeat: true
  notes: &id001
  - Explicit built-in second-order flow.
- id: builtin-webhook-register-safe
  case_id: demo-webhook-ssrf-safe
  title: Register outbound webhook target (safe control)
  tags:
  - ssrf
  - webhook
  - stateful
  - control
  - demo
  source_name: Blackhole Built-in
  source_url: https://example.invalid/blackhole/builtin
  matcher:
    method: POST
    path: /api/webhooks/register-safe
    json_fields:
    - path: $.target_url
      present: true
  response:
    status: 201
    headers:
      Content-Type: application/json
    body_template: '{"registered": true, "mode": "safe"}'
  truth:
    vuln_class: ssrf.webhook-registration-safe
    positive_evidence:
    - safe control stores target but later applies policy checks
    guardrails:
    - must not claim SSRF if internal target is blocked at delivery time
    must_not_claim:
    - ssrf
    - rfi
    - lfi
    confidence_cap: low
    emulation_grade: stateful
    automation_grade: signature_plus_state
    north_star_section: ssrf
    delayed_effect: true
    second_order: true
    second_order_sink: webhook-delivery
    requires_repeat: true
  notes: *id001
