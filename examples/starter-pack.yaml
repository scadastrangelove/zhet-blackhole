  title: OIDC request_uri safe validation control
  tags:
  - oidc
  - ssrf
  - auth
  - control
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-oidc-request-uri-safe
  matcher:
    method: GET
    path: /oidc/request-object-safe
    query:
      client_id: any
      request_uri: any
  response:
    status: 400
    headers:
      Content-Type: application/json
    body_template: '{"request_uri_not_allowed":true}'
  truth:
    vuln_class: oidc.request-uri.safe-control
    positive_evidence:
    - request_uri is allowlisted and registration-bound
    must_not_claim:
    - oidc.request-uri.ssrf
    - xss
    - lfi
    - rfi
    confidence_cap: high
    emulation_grade: stateful
    automation_grade: signature_plus_state
    north_star_section: auth
- id: builtin-oidc-webfinger-enum
  case_id: demo-oidc-webfinger-enum
  title: OIDC WebFinger account enumeration
  tags:
  - oidc
  - webfinger
  - auth
  - demo
  source_name: Blackhole Demo
  source_url: https://example.invalid/blackhole/demo-oidc-webfinger-enum
  matcher:
    method: GET
    path: /oidc/webfinger
    query:
      resource: any
  response:
    status: 200
    headers:
      Content-Type: application/json
    body_template: '{"subject":"acct:alice@blackhole.local"}'
  truth:
    vuln_class: oidc.webfinger.account-enum
    positive_evidence:
    - different WebFinger responses disclose valid accounts
    must_not_claim:
    - xss
    - lfi
    - rfi
    confidence_cap: medium
    emulation_grade: replayable
    automation_grade: signature
    north_star_section: auth
