- id: compiled-juice-restfulxsschallenge
  case_id: juice-restfulxsschallenge
  title: API-only XSS
  source_name: OWASP Juice Shop
  source_url: https://raw.githubusercontent.com/juice-shop/juice-shop/master/data/static/challenges.yml
  tags:
  - xss
  - juice-shop
  notes:
  - Compiled heuristically from normalized public corpus.
  - 'Expected evidence: attacker-controlled payload is stored and later rendered unsafely'
  - 'Endpoint pattern status: heuristic'
  truth:
    vuln_class: xss.stored
    positive_evidence:
    - attacker-controlled payload is stored and later rendered unsafely
    guardrails:
    - Do not over-claim exploitability beyond replayed behavior.
    manual_followup:
    - Confirm the issue against a realistic application when needed.
    confidence_cap: medium
    emulation_grade: stateful
    automation_grade: browser_assisted
    north_star_section: xss
    delayed_effect: true
    second_order: true
    second_order_sink: null
    requires_repeat: true
  matcher:
    method: GET
    path: /cases/juice-restfulxsschallenge/search
    query:
      q: any
  response:
    status: 200
    headers:
      Content-Type: text/html; charset=utf-8
    body_template: '<html><body><h1>API-only XSS</h1><div>Search: {{ query.q }}</div></body></html>'
