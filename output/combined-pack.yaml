    - rfi
    - lfi
    confidence_cap: low
    emulation_grade: stateful
    automation_grade: signature_plus_state
    north_star_section: ssrf
    delayed_effect: true
    second_order: true
    second_order_sink: webhook-delivery
    requires_repeat: true
  notes: *id001
